<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Workout App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-container, .webcam-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #webcam-container {
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .info-panel {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
        }
        .info-panel p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        .score {
            font-size: 1.5em;
            font-weight: bold;
            color: #4CAF50;
        }
        .current-action {
            font-size: 1.5em;
            font-weight: bold;
            color: #FF5722;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #007B9E;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>인터랙티브 워밍업 게임!</h1>
    <button type="button" id="startBtn" onclick="init()">시작하기 (웹캠 켜기)</button>
    
    <div class="container" style="display:none;" id="game-container">
        <div class="video-container">
            <!-- YouTube IFrame API가 여기에 플레이어를 생성합니다. -->
            <div id="player"></div>
        </div>
        
        <div class="webcam-container" id="webcam-container"></div>
        
        <div class="info-panel">
            <p>현재 인식된 동작: <span id="prediction-text" style="font-weight: bold;">대기 중...</span></p>
            <p>비디오에서 요구하는 동작: <span class="current-action" id="target-action">대기 중</span></p>
            <p>점수: <span class="score" id="score">0</span></p>
        </div>
    </div>

    <!-- Teachable Machine 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <script>
        // Teachable Machine 모델 URL
        const URL = "https://teachablemachine.withgoogle.com/models/Sacj8flD5/";
        let model, webcam, maxPredictions;
        let isPlaying = false;
        let score = 0;
        let currentPredictedClass = "REST";
        let scoreGivenForCurrentAction = false;

        // 비디오의 시간대에 따른 동작 정의 (초 단위)
        // 영상의 실제 내용에 맞춰 시간을 조정할 수 있습니다.
        const timeline = [
            { start: 0, end: 4, action: "REST" },
            { start: 5, end: 15, action: "SAY HI" },
            { start: 16, end: 28, action: "WALK" },
            { start: 30, end: 42, action: "SWING" },
            { start: 45, end: 58, action: "PAW" },
            { start: 60, end: 85, action: "JUMP" }
        ];

        let currentTargetAction = "REST";

        // ==========================================
        // 1. Teachable Machine & 웹캠 초기화
        // ==========================================
        async function init() {
            document.getElementById("startBtn").disabled = true;
            document.getElementById("startBtn").innerText = "모델 로딩 중...";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // 모델 로드
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // 웹캠 설정
            const flip = true; // 웹캠 반전 설정
            webcam = new tmImage.Webcam(400, 400, flip);
            await webcam.setup(); // 웹캠 접근 권한 요청
            await webcam.play();
            window.requestAnimationFrame(loop);

            // 웹캠 캔버스를 DOM에 추가
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // 게임 UI 표시 및 유튜브 영상 재생 시작
            document.getElementById("game-container").style.display = "flex";
            document.getElementById("startBtn").style.display = "none";
            
            if(player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
        }

        async function loop() {
            webcam.update(); // 웹캠 프레임 업데이트
            await predict();
            window.requestAnimationFrame(loop);
        }

        // 동작 예측 함수
        async function predict() {
            const predictions = await model.predict(webcam.canvas);
            
            // 가장 확률이 높은 동작 찾기
            let highestProb = 0;
            let bestClass = "REST";

            for (let i = 0; i < maxPredictions; i++) {
                if (predictions[i].probability > highestProb) {
                    highestProb = predictions[i].probability;
                    bestClass = predictions[i].className;
                }
            }

            // 확률이 80% 이상일 때만 동작을 인식한 것으로 처리
            if (highestProb > 0.8) {
                currentPredictedClass = bestClass;
                document.getElementById("prediction-text").innerText = bestClass + " (" + (highestProb * 100).toFixed(0) + "%)";
            }

            checkScore();
        }

        // ==========================================
        // 2. YouTube IFrame API 설정
        // ==========================================
        let player;
        
        // YouTube API 스크립트 로드
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // API가 준비되면 호출되는 함수
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: 'oRr5hxr_bRA', // 영상 ID
                playerVars: {
                    'playsinline': 1,
                    'controls': 0, // 사용자 컨트롤 숨기기
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // init() 함수에서 사용자가 시작을 누르면 영상을 재생하도록 처리합니다.
        }

        let videoInterval;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                // 영상이 재생 중일 때 0.5초마다 시간 체크
                videoInterval = setInterval(checkVideoTime, 500);
            } else {
                isPlaying = false;
                clearInterval(videoInterval);
            }
        }

        // ==========================================
        // 3. 게임 로직 (시간 체크 및 점수 부여)
        // ==========================================
        function checkVideoTime() {
            if (!player || !isPlaying) return;
            
            const currentTime = player.getCurrentTime();
            let actionFound = false;

            for (let i = 0; i < timeline.length; i++) {
                if (currentTime >= timeline[i].start && currentTime <= timeline[i].end) {
                    // 목표 동작이 변경되었을 경우 초기화
                    if (currentTargetAction !== timeline[i].action) {
                        currentTargetAction = timeline[i].action;
                        scoreGivenForCurrentAction = false; 
                    }
                    actionFound = true;
                    break;
                }
            }

            if (!actionFound) {
                currentTargetAction = "REST"; // 정의된 시간이 아닐 경우 쉬는 시간
            }

            document.getElementById("target-action").innerText = currentTargetAction;
        }

        function checkScore() {
            // 목표 동작이 REST가 아니고, 아직 점수를 받지 않았으며, 목표 동작과 인식된 동작이 일치할 때 점수 추가
            if (currentTargetAction !== "REST" && !scoreGivenForCurrentAction && currentPredictedClass === currentTargetAction) {
                score += 10;
                document.getElementById("score").innerText = score;
                scoreGivenForCurrentAction = true; // 현재 목표 동작 세션에 대해 중복 점수 획득 방지
                
                // 정답 맞춤 효과
                document.getElementById("target-action").style.color = "#4CAF50";
                setTimeout(() => { document.getElementById("target-action").style.color = "#FF5722"; }, 1000);
            }
        }
    </script>
</body>
</html>
